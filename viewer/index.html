<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EBV Phenology Raster Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1 data-i18n="title">Vegetation Phenology in Finland</h1>
      <p data-i18n="subtitle">Raster viewer for yearly start of the Vegetation Active Period (VAP), 2001–2018.</p>
    </div>
    <div class="language-box">
      <label for="language" data-i18n="language">Language</label>
      <select id="language"><option value="en">English</option><option value="es">Español</option><option value="ro">Română</option><option value="zh">中文</option></select>
    </div>
  </header>
  <main class="layout">
    <aside class="panel">
      <div class="field"><label for="entity" data-i18n="entity">Entity</label><select id="entity"><option value="Coniferous" data-i18n="coniferous">Coniferous forest</option><option value="Deciduous" data-i18n="deciduous">Deciduous vegetation</option></select></div>
      <div class="field"><label for="year" data-i18n="year">Year</label><div class="year-row"><input id="year" type="range" min="2001" max="2018" value="2001" step="1"><strong id="yearLabel">2001</strong></div></div>
      <div class="field"><label for="opacity" data-i18n="opacity">Opacity</label><input id="opacity" type="range" min="0" max="1" value="0.78" step="0.02"></div>
      <section class="legend-card"><h2 data-i18n="legend">VAP day of year</h2><div class="legend-gradient"></div><div class="legend-labels"><span><span data-i18n="early">Earlier</span><br><b>40</b></span><span><span data-i18n="late">Later</span><br><b>200</b></span></div></section>
      <section class="stats-card"><h2 data-i18n="summary">Layer summary</h2><dl><dt data-i18n="valid">Valid cells</dt><dd id="validCells">—</dd><dt data-i18n="mean">Mean VAP</dt><dd id="meanVal">—</dd><dt data-i18n="min">Min</dt><dd id="minVal">—</dd><dt data-i18n="max">Max</dt><dd id="maxVal">—</dd></dl></section>
      <p class="hint" data-i18n="click">Click on the raster to inspect a grid cell.</p><p class="source-note" data-i18n="sourceNote"></p><p><a href="data/metadata_v2.json" target="_blank" data-i18n="metadata">Dataset metadata</a></p>
    </aside>
    <section id="map" aria-label="EBV phenology raster map"></section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="app.js"></script>
</body>
</html>
